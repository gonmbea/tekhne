<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>TEKHNE</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="../css/styles.css" />
        <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    </head>

    <body>
        <div class="content-wrapper">
            <!-- Navigation -->
            <div id="navbar"></div>

            <!-- Art Hero Section -->
            <div class="hero gx-0 container">
                <div class="row gx-0 align-items-center">
                    <!-- Left column (text) -->
                    <div class="col-md-6 text-left pe-md-5">
                        <h1>Tekhne - Art</h1>
                        <p>Sneak peak into some of my art works. Maybe I'll add some more later.</p>
                    </div>
                    <!-- Right column (image) -->
                    <div class="col-md-6 text-center">
                        <img src="../assets/cubismChicken.png" alt="Abstract Chicken" class="img-fluid" />
                    </div>
                </div>
            </div>

            <!-- Art Gallery Section -->
            <div class="container my-5">
                <!-- Full-width row for the "surf" image -->
                <div class="row gx-0 mb-3">
                    <img src="../assets/art/surf.png" alt="Surf" class="img-fluid rounded" />
                </div>

                <div class="row gx-3" id="galleryBootstrapColumns">
                    <div class="col" id="leftCol"></div>
                    <div class="col" id="rightCol"></div>
                </div>

                
            </div>

            <script>
                const artworks = [
                    '../assets/art/bluenose.png',
                    '../assets/art/homemAzul.png',
                    // '../assets/art/gardenFaeries.png',
                    // '../assets/art/selfPortrait.png',
                    '../assets/art/pinkScream.png',
                    // '../assets/art/trunkGuy.png',
                    '../assets/art/peggys.png'
                ];

                // Attempt to mimic a css column first style
                const middleIndex = Math.floor(artworks.length / 2);
                const leftImages = artworks.slice(0, middleIndex);
                const rightImages = artworks.slice(middleIndex);

                const leftCol = document.getElementById("leftCol");
                const rightCol = document.getElementById("rightCol");

                // Function to add images to a column
                function addImages(column, images) {
                    images.forEach(src => {
                        const img = document.createElement("img");
                        img.src = src;
                        img.alt = "";
                        img.className = "img-fluid rounded mb-3";
                        column.appendChild(img);
                    });
                }

                addImages(leftCol, leftImages);
                addImages(rightCol, rightImages);
            </script>
            <script src="../js/navbar.js"></script>
    </body>

</html>
